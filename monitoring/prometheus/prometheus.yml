global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: unity3d-mcp
    metrics_path: /metrics
    static_configs:
      - targets: ["unity3d-mcp:9092"]
        labels:
          service: unity3d-mcp

  - job_name: unity3d-mcp-http
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["unity3d-mcp:10831"]
        labels:
          service: unity3d-mcp
