<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Unity3D-MCP Icon - Unity cube with VR elements -->
  <defs>
    <linearGradient id="unityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#unityGradient)"/>
  
  <!-- Unity cube (isometric) -->
  <g transform="translate(256,200)">
    <!-- Top face -->
    <polygon points="0,-60 80,-20 0,20 -80,-20" fill="#FFFFFF" opacity="0.9"/>
    <!-- Left face -->
    <polygon points="-80,-20 -80,80 0,120 0,20" fill="#CCCCCC" opacity="0.8"/>
    <!-- Right face -->
    <polygon points="80,-20 80,80 0,120 0,20" fill="#EEEEEE" opacity="0.85"/>
  </g>
  
  <!-- VR headset icon (bottom) -->
  <g transform="translate(256,380)">
    <rect x="-40" y="-15" width="80" height="30" rx="5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="-20" cy="0" r="8" fill="#0066FF"/>
    <circle cx="20" cy="0" r="8" fill="#0066FF"/>
  </g>
  
  <!-- Text: Unity MCP -->
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Unity MCP</text>
</svg>

